apiVersion: ai-sdd/v1
kind: Worker
metadata: { name: reviewer }
spec:
  workerKind: transform
  consumes:
    - { schema: feature-plan.v1, required: true }
    - { schema: changeset.v1, required: true }
  produces: [{ schema: review.v1 }]
  task: { skill: review-feature }
  model: deep-reasoning
  reasoning: high
  checks: [review.structure, review.coverage]
