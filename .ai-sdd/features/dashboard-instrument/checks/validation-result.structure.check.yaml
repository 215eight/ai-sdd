apiVersion: ai-sdd/v1
kind: Check
metadata: { name: validation-result.structure }
spec:
  # Tier-1 structural gate (compiled from validation-result.schema.yaml). This IS the milestone
  # verdict gate: a `fail` outcome, or any failed criterion, fails the check → the milestone
  # re-validates. Trusted-by-construction (the `ai-sdd check` executor is engine-tested), so blocking.
  checkKind: deterministic
  command: "swift run ai-sdd check .ai-sdd/schemas/validation-result.schema.yaml .ai-sdd/artifacts/validation-result.v1.yaml"
  required: true
