apiVersion: ai-sdd/v1
kind: Check
metadata: { name: m1.integration }
spec:
  # The m1-no-data-band phase gate (automated, D2). The no-new-data dashboard (four bands,
  # project-first, slice-ids on nodes, critical-path marking, runnable ranking) must render green
  # before the temporal band builds on it — full build + test + spec-validation. The specific render
  # behaviours are asserted by the phase-1 slices' own tests, so `swift test` here transitively covers
  # them. Trusted-by-construction (engine-tested commands), so blocking.
  checkKind: deterministic
  command: "swift build && swift test && swift run ai-sdd validate .ai-sdd"
  required: true
