    convention. The slice correctly leaves .ai-sdd/skills surfacing to seed/surface (decision D5) and
    does not touch scripts/ or .github/ infra.

decisions:
  - id: byte-identical-verified
    notes: >-
      Ran `diff skills/ai-sdd-update/SKILL.md Sources/AISDDEngine/Resources/skills/ai-sdd-update/SKILL.md`
      directly — no output, exit 0. The embedded copy is a real file (ls confirms a regular SKILL.md, not
      a symlink), so SwiftPM bundles exactly the source bytes adopters receive.
  - id: skill-contract-safe
    notes: >-
      Read the full SKILL.md: it checks via `ai-sdd update --check`, gates the apply on explicit
      confirmation (never auto, no changes on decline or up-to-date), runs `ai-sdd update` only on
      confirm, and lands a standalone `chore(ai-sdd): update framework to vX.Y.Z` commit deliberately
      shaped to clear the integrity hook, with a no-hard-restart closing note. Contract is correct and
      safe.
  - id: embedding-wiring-functionally-verified
    notes: >-
      Beyond the static baseline check, confirmed end-to-end: a fresh `.build/debug/ai-sdd seed` into a
      mktemp git repo materialized all seven framework skills including ai-sdd-update under
      .ai-sdd/skills/, symlinked into both .agents/skills and .claude/skills, with seeded content
      byte-identical to the repo-root source.

