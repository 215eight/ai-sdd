schema: review.v1
run: self-update
slice: embed-resources-inline

verdict: approve

summary: >-
  Independently reproduced the distribution-breaking fix. After ./scripts/gen-version.sh +
  ./scripts/gen-embedded-resources.sh + swift build, copying ONLY the ai-sdd binary into an isolated
  dir (no .build, no bundle, no clone) and running `ai-sdd seed` against a throwaway git repo prints
  RELOCATION_OK: all 7 skills (incl. ai-sdd-update) materialize as .ai-sdd/skills/<id>/SKILL.md, the
  .git/hooks/pre-commit installs, and NO ai-sdd_AISDDEngine.bundle sits beside the binary. A from-clean
  build (rm -rf .build, regen, swift build) produces NO ai-sdd_AISDDEngine.bundle for the AISDDEngine
  target anywhere under .build. EmbeddedFramework reads exclusively from the compiled-in
  EmbeddedFrameworkData (no Bundle.module call remains — the only "Bundle.module" strings in Sources are
  doc comments). All five public signatures are byte-for-byte preserved and Seeder.swift /
  SkillSurface.swift / the CLI are untouched in the diff. swift test green (323 tests, 14 suites) and
  `validate .ai-sdd` valid. Conventions hold. APPROVE.

items:
  - id: AC1-relocation-seed
    verdict: pass
    notes: >-
      Reproduced exactly: D=$(mktemp -d); cp .build/debug/ai-sdd "$D/"; R=$(mktemp -d);
      git -C "$R" init -q; (cd "$D" && ./ai-sdd seed "$R") exited 0. Then asserted
      "$R/.ai-sdd/skills/ai-sdd-update/SKILL.md" and "$R/.git/hooks/pre-commit" exist and
      "$D/ai-sdd_AISDDEngine.bundle" does NOT exist — printed RELOCATION_OK. All 7 skill dirs present
      under the target home. No Bundle.module fatal error. Verified locally with no GitHub release.
  - id: AC2-compiled-in-unit
    verdict: pass
    notes: >-
      EmbeddedFrameworkTests.compiledInWithoutBundle asserts skillIds() == Layout.embeddedFrameworkSkillIds
      (7 ids incl. ai-sdd-update), every skillManifest non-empty, hookSource non-empty and containing the
      Layout.managedHookMarker (ai-sdd:managed-hook), and that no ai-sdd_AISDDEngine.bundle exists beside
      the test binary. Passes within the green 323-test run. Source inspection confirms every read decodes
      base64 from EmbeddedFrameworkData (skillManifest, hookSource) with no resource lookup.
  - id: AC3-no-bundle-no-resources-dir
    verdict: pass
    notes: >-
      Package.swift AISDDEngine target carries no `resources:`/`.copy` (confirmed in diff and current
      source). After rm -rf .build + regen + swift build, find .build -name ai-sdd_AISDDEngine.bundle
      returns NOTHING. Sources/AISDDEngine/Resources/ is deleted (test -e => DELETED; diff removes all
      Resources/skills/*/SKILL.md + hooks/pre-commit). Note: an incremental .build left over from a
      pre-change build can still hold a STALE bundle (observed ~3h older than the binary, with old
      Resources content); it is never regenerated by the new target and is absent from a clean build.
  - id: AC4-api-stable
    verdict: pass
    notes: >-
      All five public statics preserved verbatim: skillIds() -> [String]; skillManifest(_ id) throws
      -> Data; skillFiles(_ id) throws -> [String: Data]; hookSource() throws -> Data; materialize(to:)
      throws. Typed EmbeddedError cases (skillsResourceMissing / skillMissing / hookResourceMissing)
      retained for unknown-id and decode-failure paths. Seeder.swift, SkillSurface.swift, and the CLI
      seed/update commands are NOT in `git diff HEAD --name-only`. SeederTests + EmbeddedFrameworkTests
      pass against the new read side.
  - id: AC5-green-toolchain
    verdict: pass
    notes: >-
      Both gen scripts exist (scripts/gen-version.sh, scripts/gen-embedded-resources.sh) and emit the
      gitignored sources (.gitignore lines 78-80 ignore Version.swift and
      Generated/EmbeddedFrameworkData.swift). swift build: Build complete. swift test: 323 tests in 14
      suites passed. swift run ai-sdd validate .ai-sdd: valid (3 nodes, 3 edges, 4 workers, 8 checks).

conventions:
  satisfied: true
  notes: >-
    Read-side change stays in AISDDEngine (engine/CLI/models layering intact); no inline path literals —
    EmbeddedFramework uses Layout.skillManifestFile / embeddedSkillsResourceDir / embeddedHookResourceDir
    / embeddedHookFile throughout, and Layout retains those names reframed as the materialized on-disk
    layout (not bundle basenames), per plan D3/scope. Tests use Swift Testing (@Test/#expect/#require)
    with the unknown-id path asserting the typed skillMissing error (typed-errors convention). No lint
    command invented — verification relied on swift build + swift test, honoring the open-gap lint
    convention. The generated EmbeddedFrameworkData.swift is gitignored, mirroring the proven Version.swift
    precedent.

decisions:
  - id: relocation-reproduced
    notes: >-
      The whole point of the slice. Lone copied binary (no .build/bundle/clone beside it) seeded a fresh
      git repo with all 7 framework skills + the pre-commit hook and produced no sibling bundle —
      RELOCATION_OK printed. This is the empirical proof the Bundle.module distribution crash is gone.
  - id: no-bundle-on-clean-build
    notes: >-
      rm -rf .build then regen + swift build produces NO ai-sdd_AISDDEngine.bundle for the AISDDEngine
      target. The only bundles observed earlier were stale pre-change artifacts; AC3 holds for a fresh
      build. Recommend a clean .build before release packaging so no stale bundle is shipped.
  - id: api-byte-for-byte
    notes: >-
      Verified the five public signatures unchanged and that Seeder/SkillSurface/CLI are not in the diff,
      so the update reseed path and surfacing are unaffected. EmbeddedError contract preserved.

caveats:
  - >-
    Cosmetic, non-blocking, out of this slice's declared file scope: Seeder.swift's header doc-comment
    still reads "EmbeddedFramework / Bundle.module" — a stale reference now that Bundle.module is gone. No
    code path uses it; safe to tidy on a later touch of Seeder.
  - >-
    The gitignored generated EmbeddedFrameworkData.swift and Version.swift are build prerequisites (D2
    manual-infra dependency): any runner/CI MUST run both gen scripts before swift build/test, or a clean
    checkout fails to build. The generator + its install.sh/release wiring are tracked on the manual
    checklist, not in this slice.
  - >-
    An incremental .build from a pre-change build can persist a stale ai-sdd_AISDDEngine.bundle. It is
    harmless (the relocated binary never reads it) and absent from a clean build; clear .build before
    packaging a release.

rework: []
