summary: >-
  Make the ai-sdd binary's reported version tag-derived instead of the hardcoded "ai-sdd 0.5.0"
  string, so a release tag is the single source of truth and can never drift from `--version`. The
  CLI's `CommandConfiguration(version:)` references a generated `AISDDVersion.current` symbol (emitted
  into the gitignored build product `Sources/AISDDCLI/Version.swift` by `scripts/gen-version.sh`).
  Because a file literally named `main.swift` forces Swift top-level-code mode — which is forbidden
  alongside the target's `@main` once a second source file (`Version.swift`) exists — the entry file is
  renamed `Sources/AISDDCLI/main.swift` -> `Sources/AISDDCLI/CLI.swift` in the same change. Reusable
  version parse/compare helpers (parse `vX.Y.Z`, detect a `-dev`/non-release value, semver-compare two
  versions) land in `AISDDEngine` with Swift Testing coverage, ready for the later
  update-check/seed/drift slices to consume.

scope:
  in:
    - Rename the CLI entry file `Sources/AISDDCLI/main.swift` -> `Sources/AISDDCLI/CLI.swift` (content otherwise unchanged) to leave top-level-code mode so a second source file in the `@main` target can coexist.
    - Change the `CommandConfiguration(version:)` argument from the literal `"ai-sdd 0.5.0"` to interpolate the generated symbol so the printed value is "ai-sdd " followed by AISDDVersion.current (Swift string interpolation of AISDDVersion.current).
    - Add a pure version-helper type to `AISDDEngine` that parses a `vX.Y.Z[-suffix]` (or bare `X.Y.Z`) string, flags a `-dev`/describe/non-release value, and semver-compares two parsed versions; fail-closed (malformed -> unknown, never crashes).
    - Add a Swift Testing test file under `Tests/AISDDEngineTests/` covering the helpers (ordering, dev/non-release detection, malformed input).
    - Optionally add a version-helper name/path literal to `Sources/AISDDEngine/Layout.swift` only if one is genuinely required (default: no change there).
  out:
    - Authoring or committing `Sources/AISDDCLI/Version.swift` (a gitignored build product generated by `scripts/gen-version.sh`; the implementer RUNS that script so the file exists before building, but never edits or commits it).
    - Editing `scripts/gen-version.sh`, the `.gitignore` entry, `.github/` workflows, `scripts/release.sh`, or any release infra (manual-infra companions, outside the factory's declarable file scope).
    - The `update --check` / `update` / `seed` commands, the stderr banner, `.ai-sdd/VERSION`, and any network/download behavior (later m1/m2 slices).
    - Wiring the helpers into any caller (update-check/seed/drift consume them in their own slices).

acceptance:
  - id: A1-version-tag-derived
    description: >-
      `ai-sdd --version` reports the generated value rather than a hardcoded literal: a clean `v0.6.0`
      build prints `ai-sdd 0.6.0`. The `version:` argument in `CommandConfiguration` interpolates
      `AISDDVersion.current`, and no `"ai-sdd 0.5.0"` literal remains in the entry file.
  - id: A2-entry-file-renamed
    description: >-
      The entry file is `Sources/AISDDCLI/CLI.swift` (not `main.swift`); the `@main struct AISDD`
      definition lives there with behavior unchanged, and `Sources/AISDDCLI/main.swift` no longer exists.
      `swift build` succeeds with a generated `Version.swift` present — no
      `'main' attribute cannot be used in a module that contains top-level code` error.
  - id: A3-version-helpers
    description: >-
      `AISDDEngine` exposes pure helpers that parse `vX.Y.Z`/`X.Y.Z` (a leading `v` is tolerated),
      semver-compare two versions (e.g. `0.6.0` > `0.5.0`), and detect a non-release/`-dev`/describe value
      so an update nudge can be skipped. Malformed input fails closed (treated as unknown, no crash).
  - id: A4-helper-tests
    description: >-
      A Swift Testing test file under `Tests/AISDDEngineTests/` covers the helpers: `0.6.0` > `0.5.0`; a
      `-dev` value is recognized as non-release ("skip the nudge"); malformed input is treated as unknown
      without crashing.
  - id: A5-build-and-test-green
    description: >-
      `swift build` and `swift test` are green after the implementer has run `scripts/gen-version.sh` to
      generate `Sources/AISDDCLI/Version.swift`.

decisions:
  - id: D1-rename-target
    status: closed
    decision: >-
      Rename the entry file to `Sources/AISDDCLI/CLI.swift` (the brief's suggested name). A file literally
      named `main.swift` forces top-level-code mode, which Swift forbids alongside the target's `@main`
      once a second source file (`Version.swift`) exists; the rename is REQUIRED and must land together
      with introducing `Version.swift`. The diff-in-scope gate sees a git rename as delete+add, so the
      `files` list covers BOTH the old `Sources/AISDDCLI/main.swift` and the new `Sources/AISDDCLI/CLI.swift`.
  - id: D2-no-package-swift-change
    status: closed
    decision: >-
      Do NOT add an explicit `sources:` list to the AISDDCLI target in `Package.swift`. SwiftPM compiles
      every `.swift` file in the target directory by default, so the renamed `CLI.swift` plus the
      generated `Version.swift` are both picked up automatically. `Package.swift` is therefore NOT in the
      file scope for this slice.
  - id: D3-version-interpolation
    status: closed
    decision: >-
      The CLI references the generated symbol via a Swift-interpolated version string equal to "ai-sdd "
      followed by AISDDVersion.current, set as the `CommandConfiguration` version argument.
      AISDDVersion.current is the bare version string (e.g. `0.6.0`); the
      `"ai-sdd "` prefix stays in the CLI so the generator stays prefix-free — matching
      `scripts/gen-version.sh`, which emits the bare describe/semver value (`v` stripped).
  - id: D4-version-swift-is-generated
    status: closed
    decision: >-
      `Sources/AISDDCLI/Version.swift` is a gitignored build product (already in `.gitignore` line 78)
      emitting `enum AISDDVersion { static let current = "<ver>" }`. The implementer runs
      `scripts/gen-version.sh` (manual infra, already present and emitting this exact form) before
      building so the symbol resolves; this slice never authors or commits the file. A dev build with no
      tag yields a `git describe --tags --always --dirty` value (or `0.0.0-unknown` outside a git
      checkout); a clean tagged build yields the bare semver.
  - id: D5-helpers-location-and-api
    status: closed
    decision: >-
      Version helpers live in a new pure file `Sources/AISDDEngine/Version.swift` in the `AISDDEngine`
      module (per swift.md: engine behavior under AISDDEngine; the later update-check/seed/drift slices
      reuse them). Expose a `public` parsed-version value type (e.g. `struct SemanticVersion: Comparable`)
      with a failable parse that tolerates a leading `v`, plus an `isRelease`/`isDev` discriminator (a
      value carrying a pre-release/build/describe suffix, or one that does not parse, is non-release).
      Comparison is semver major.minor.patch precedence. Parsing fails closed: a malformed string surfaces
      as a nil/unknown value the caller treats as "non-release / unknown", never a crash or unhandled
      throw. This engine file (`Sources/AISDDEngine/Version.swift`) is intentionally distinct from the
      gitignored CLI build product (`Sources/AISDDCLI/Version.swift`).
  - id: D6-no-layout-change-unless-needed
    status: closed
    decision: >-
      No `.ai-sdd/VERSION` stamp path or release URL is introduced in this slice, so `Layout.swift` need
      not change. It is listed in `files` only as a permitted touch point in case the helper needs a
      centralized name literal; the implementer should add nothing there unless a literal is genuinely
      required.
  - id: D7-tests-framework
    status: closed
    decision: >-
      Tests use Swift Testing (`@Test`, `#expect`, `#require`) in a new file under
      `Tests/AISDDEngineTests/` (e.g. `VersionTests.swift`), per the confirmed test convention — not
      XCTest — with `@testable import AISDDEngine`.

files:
  - Sources/AISDDCLI/main.swift
  - Sources/AISDDCLI/CLI.swift
  - Sources/AISDDEngine/Version.swift
  - Sources/AISDDEngine/Layout.swift
  - Tests/AISDDEngineTests/VersionTests.swift

tests:
  - "scripts/gen-version.sh   # generate the gitignored Sources/AISDDCLI/Version.swift so AISDDVersion.current resolves (manual infra; run before building)"
  - "swift build"
  - "swift test"
  - "swift run ai-sdd --version   # expect 'ai-sdd <version>' from AISDDVersion.current"
