schema: review.v1
run: self-update
slice: tag-derived-version

verdict: approve
summary: >-
  Review of slice tag-derived-version against feature-plan.v1 (5 acceptance ids) and changeset.v1.
  Independently verified against the real diff, build, and test run. The CLI now derives its version
  from the generated `AISDDVersion.current` symbol (`version: "ai-sdd \(AISDDVersion.current)"` at
  CLI.swift:14); no `"ai-sdd 0.5.0"` literal remains. The main.swift -> CLI.swift rename is clean
  (git rename; old file gone; `@main struct AISDD` builds with no top-level-code error). The pure
  `SemanticVersion` helper in AISDDEngine parses `vX.Y.Z[-suffix]`, semver-compares on
  major.minor.patch, exposes isRelease/isDev, and fails closed (malformed -> nil). Swift Testing
  coverage is genuine and complete. swift build clean; swift test 289 tests / 11 suites green;
  VersionTests 6/6; `.build/debug/ai-sdd --version` -> `ai-sdd 3fdf641-dirty` (correct dev describe
  value, no tag present). Conventions (engine/CLI/test layering, pure engine, Layout untouched) hold.
  APPROVE.

items:
  - id: A1-version-tag-derived
    verdict: pass
    notes: >-
      CommandConfiguration version argument is `"ai-sdd \(AISDDVersion.current)"` (CLI.swift:14),
      interpolating the generated symbol. No `"ai-sdd 0.5.0"` literal remains in the entry file (grep
      confirmed; the other `version:` occurrences are unrelated `metadata.version`). `--version`
      prints `ai-sdd 3fdf641-dirty`, derived from the generated value; a clean `v0.6.0` build would
      print `ai-sdd 0.6.0` since gen-version.sh strips the leading `v`.
  - id: A2-entry-file-renamed
    verdict: pass
    notes: >-
      Entry file is Sources/AISDDCLI/CLI.swift; `@main struct AISDD: ParsableCommand` lives there with
      behavior unchanged. Sources/AISDDCLI/main.swift no longer exists (git records
      'RM main.swift -> CLI.swift'). swift build succeeds with the generated Version.swift present and
      no `'main' attribute cannot be used in a module that contains top-level code` error.
  - id: A3-version-helpers
    verdict: pass
    notes: >-
      `public struct SemanticVersion: Comparable, Equatable, Hashable` in Sources/AISDDEngine/Version.swift.
      Failable `init?(_:)` tolerates a single leading `v`, requires exactly three non-negative integer
      components in the head (rejects empty parts, signs, non-digits, wrong arity), and splits off the
      first `-`/`+` suffix. `<` orders on (major, minor, patch). isRelease = no suffix; isDev = suffix
      present. Malformed input returns nil — no crash, no throw. Fail-closed per D5.
  - id: A4-helper-tests
    verdict: pass
    notes: >-
      Tests/AISDDEngineTests/VersionTests.swift uses Swift Testing (`@Test`/`#expect`/`#require`,
      `@testable import AISDDEngine`) per D7. Covers: `0.6.0 > 0.5.0` plus major/minor/patch
      precedence; `-dev`/`-rc.1`/`+build.7`/`git describe` tail recognized as non-release (isDev);
      malformed inputs (empty, whitespace, bare SHA, `unknown`, `1.2`, `1`, `1.2.3.4`, `1.2.x`, `v`,
      `vv1.2.3`, `1..3`, `-1.2.3`, `a.b.c`) all fail closed to nil without crashing; leading-`v`
      tolerance; the `0.0.0-unknown` tarball fallback parses with a non-release suffix. All 6 tests
      pass.
  - id: A5-build-and-test-green
    verdict: pass
    notes: >-
      After running scripts/gen-version.sh to emit the gitignored Sources/AISDDCLI/Version.swift,
      swift build is green and swift test reports 289 tests in 11 suites passed, including the new
      VersionTests suite. swift test --filter VersionTests independently green (6/6).

conventions:
  satisfied: true
  notes: >-
    Layering matches swift.md: SemanticVersion is engine behavior under Sources/AISDDEngine, the CLI
    surface change is under Sources/AISDDCLI, and the test sits in Tests/AISDDEngineTests using Swift
    Testing. The engine file is pure — imports only Foundation, no I/O, no CLI/Models coupling — and is
    positioned for reuse by the later update-check/seed/drift slices. Layout.swift was correctly left
    unchanged (D6 — no centralized literal was genuinely required). The generated CLI Version.swift
    remains gitignored and uncommitted (git status shows only the AISDDEngine Version.swift as
    untracked, not the CLI build product).

decisions:
  - id: rename-as-add-delete
    notes: >-
      The diff-in-scope premise (D1) held: git surfaces the rename as RM main.swift -> CLI.swift, and
      the plan's files list covers both paths, so the rename lands cleanly.
  - id: prefix-placement
    notes: >-
      Per D3, AISDDVersion.current is the bare value and the `"ai-sdd "` prefix stays in the CLI string;
      gen-version.sh emits the prefix-free describe/semver value (v stripped) — verified the generated
      symbol is `3fdf641-dirty` with no `ai-sdd ` prefix.

rework: []
