summary: >-
  Extracted the schema->checks compiler from the ai-sdd-compile-schema skill prose into the engine as
  a pure, reusable library. Added `SchemaCompiler` in AISDDEngine (no IO in the core) that maps a
  `SchemaSpec` (+ name/version) to tiered `CheckSpec`s, each tagged by a `CompiledCheck.Origin`
  (`autoGenerated` | `authored`): Tier-1 reproduces the committed `<name>.structure` deterministic
  check verbatim (`swift run ai-sdd check <schema> <artifact>`, required) and is keyed only off
  name/version/format; Tier-2 compiles an explicit-`command` rule to a verbatim deterministic check
  (blocking iff its severity is blocking); intent-only rules and Tier-3 judges become advisory
  `authored` markers with no fabricated command/verdict (a judge carries `checkKind: judge`,
  `required: false`). Added additive optional `rules`/`judge` (+ `RuleSpec`/`JudgeSpec`) to
  `SchemaSpec` so existing schemas still decode, centralized the new path literals in `Layout.swift`,
  moved committed-shape `kind: Check` YAML rendering to an engine edge (`CompiledCheckRenderer`),
  surfaced a read-only `ai-sdd compile <schema>` CLI subcommand (committed-shape YAML tagged by
  origin, `--json`, `--help`; writes nothing), updated the `ai-sdd-compile-schema` skill to drive
  `ai-sdd compile` and corrected its Tier-1 example from `ai-sdd check ...` to `swift run ai-sdd
  check ...`, and added `SchemaCompilerTests` (the per-schema correctness anchor asserting the
  structural check equals the committed one, plus per-tier units and a YAML round-trip). `Drift.swift`
  was left untouched (C4 is the downstream dedupe-drift slice). `swift build`, `swift test` (154
  tests), `swift run ai-sdd validate .ai-sdd`, and `swift run ai-sdd compile
  .ai-sdd/schemas/feature-plan.schema.yaml` all pass.
satisfies:
  - A1-structural-reproduces-committed
  - A2-structural-origin-autogenerated
  - A3-explicit-command-rule
  - A4-intent-and-judge-authored
  - A5-compile-cli
  - A6-skill-drives-engine
  - A7-paths-centralized
  - A8-green
