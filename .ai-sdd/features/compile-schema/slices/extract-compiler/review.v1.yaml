schema: review.v1
run: compile-schema
slice: extract-compiler

summary: >-
  Reviewed the extract-compiler slice against feature-plan.v1 (A1-A8, C1-C5) by inspecting the actual
  diff and running every gate. The pure `SchemaCompiler` (Sources/AISDDEngine/SchemaCompiler.swift)
  maps a `SchemaSpec` (+ name/version) to tiered `CompiledCheck`s tagged by `Origin`
  (auto-generated|authored) with NO IO in the core; the render edge (CompiledCheckRenderer.swift)
  emits committed-shape `kind: Check` YAML; `ai-sdd compile` is registered and read-only; new path
  literals are centralized in Layout.swift; additive `rules`/`judge` (+ RuleSpec/JudgeSpec) on
  SchemaSpec keep existing schemas decoding; the skill drives `ai-sdd compile` and its Tier-1 example
  was corrected to `swift run ai-sdd check ...`; Drift.swift is untouched (C4). swift build, swift test
  (154 tests, incl. the per-schema correctness anchor + DriftTests/EngineTests), swift run ai-sdd
  validate .ai-sdd, and the compile spot-check all pass. The compiled changeset.structure reproduces
  the committed check verbatim.

items:
  - id: A1-structural-reproduces-committed
    verdict: pass
    notes: >-
      SchemaCompiler.structuralCheck (SchemaCompiler.swift:65-79) emits name `<name>.structure`,
      checkKind deterministic, command `swift run ai-sdd check .ai-sdd/schemas/<name>.schema.yaml
      .ai-sdd/artifacts/<name>.v<version>.<format>`, required:true. The anchor test
      `structuralReproducesCommitted` (SchemaCompilerTests.swift:27-55) reads every real committed
      `.ai-sdd/schemas/*.schema.yaml` and the real `checks/<name>.structure.check.yaml`, comparing
      name/checkKind/command/required field-for-field — NOT a hardcoded expectation — and passed.
      Spot-checked `swift run ai-sdd compile .ai-sdd/schemas/changeset.schema.yaml`: the spec body
      matches the committed `.ai-sdd/checks/changeset.structure.check.yaml` exactly.
  - id: A2-structural-origin-autogenerated
    verdict: pass
    notes: >-
      structuralCheck returns origin `.autoGenerated` (SchemaCompiler.swift:77), keyed only off
      name/version/format (paths via Layout helpers; no FileManager/IO in the enum). Units
      `structuralTemplateKeyedOffNameVersionFormat`, `formatDefaultsToYaml`, and
      `noFieldsYieldsNoStructuralCheck` (SchemaCompilerTests.swift:59-81) assert the pure template and
      that it gates only when fields exist.
  - id: A3-explicit-command-rule
    verdict: pass
    notes: >-
      ruleChecks (SchemaCompiler.swift:86-105) compiles an explicit-`command` rule to checkKind
      deterministic, command verbatim, origin `.autoGenerated`, required = rule.isBlocking
      (Spec.swift:282 -> `(severity ?? "blocking") != "advisory"`). Tests
      `explicitCommandRuleBlocking` (omitted severity -> required:true) and
      `explicitCommandRuleAdvisory` (advisory -> required:false) pass.
  - id: A4-intent-and-judge-authored
    verdict: pass
    notes: >-
      Intent-only rule -> origin `.authored`, command nil, required:false (SchemaCompiler.swift:99-103;
      test `intentOnlyRuleIsAuthoredNoCommand`). judgeChecks (SchemaCompiler.swift:111-120) ->
      checkKind judge, required:false, command nil, origin `.authored` (test
      `judgeIsAuthoredAdvisoryNoVerdict`). No fabricated command or verdict in either path.
  - id: A5-compile-cli
    verdict: pass
    notes: >-
      `Compile` ParsableCommand (main.swift:379-406) registered in `subcommands:` (main.swift:15).
      Prints committed-shape YAML via CompiledCheckRenderer (origin tag + apiVersion/kind/metadata/
      spec); `--json` emits the machine form; `--help` documents both — all verified by running the
      binary. Read-only: `git status --porcelain` showed no filesystem mutations after running compile.
  - id: A6-skill-drives-engine
    verdict: pass
    notes: >-
      SKILL.md diff adds a "Compile the deterministic tiers with the engine" section invoking
      `ai-sdd compile <schema>` (and `--json`), explains auto-generated (commit as-is) vs authored
      (finish + eval-gate by hand) origins, and corrects the Tier-1 + worked-example commands from
      `ai-sdd check ...` to `swift run ai-sdd check ...`.
  - id: A7-paths-centralized
    verdict: pass
    notes: >-
      Layout.swift:116-140 adds schemaSourcePath, artifactPath, structuralCheckName, checkSourcePath;
      SchemaCompiler.swift uses these exclusively (no inline path literals). YAML serialization lives at
      the engine edge CompiledCheckRenderer.swift, keeping the compiler core encoder-free; round-trip
      asserted by `renderedYamlRoundTrips`.
  - id: A8-green
    verdict: pass
    notes: >-
      swift build complete; swift test 154 tests in 5 suites passed (incl. SchemaCompilerTests and
      DriftTests/EngineTests); swift run ai-sdd validate .ai-sdd valid. `rulesAndJudgeAreAdditive`
      confirms a bare schema with no rules/judge still decodes (additive Codable). Drift.swift confirmed
      UNCHANGED via `git status --porcelain` (empty) — C4 honored.

verdict: approve
rework: []
