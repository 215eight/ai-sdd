summary: >-
  Extract the ai-sdd schema->checks compiler out of the `ai-sdd-compile-schema` skill prose and into
  the engine as a reusable, pure library. Add a `SchemaCompiler` type in `AISDDEngine` that maps a
  parsed `SchemaSpec` (+ name/version) to the `CheckSpec(s)` it compiles to, each tagged by an
  `Origin` (`autoGenerated` vs `authored`). Tier-1 (structural) reproduces the COMMITTED
  `<name>.structure` deterministic check verbatim (`swift run ai-sdd check <schema> <artifact>`,
  `required: true`); Tier-2 adds optional `rules` to `SchemaSpec` where an explicit-`command` rule
  compiles to a verbatim deterministic check (blocking iff its severity is blocking); Tier-3 adds
  optional `judge` and emits judges plus intent-only rules as explicit `authored` advisory markers
  with no fabricated command/verdict. Surface it via a read-only `ai-sdd compile <schema>` CLI
  subcommand (committed-shape `kind: Check` YAML, `--json`, `--help`) and update the
  `ai-sdd-compile-schema` skill to drive it for the deterministic tiers. A correctness-anchor test
  compiles every real `.ai-sdd/schemas/*.schema.yaml` and asserts the structural check equals the
  committed `checks/<name>.structure.check.yaml`. The Drift Kind-1 dedupe is a downstream slice and
  is OUT of scope here -- leave `Drift.swift` untouched.

scope:
  in:
    - "Add a pure `SchemaCompiler` type in `Sources/AISDDEngine/SchemaCompiler.swift` -- no IO in the core; `SchemaSpec` (+ name/version) -> compiled checks, each tagged by an `Origin` (`autoGenerated` | `authored`)."
    - "Tier-1 (structural) mechanical template keyed off schema name/version/format -> one `<name>.structure` `CheckSpec` (`checkKind: deterministic`, `required: true`, command `swift run ai-sdd check .ai-sdd/schemas/<name>.schema.yaml .ai-sdd/artifacts/<name>.v<version>.<format>`). This is the correctness anchor; it MUST reproduce the committed gate."
    - "Tier-2 (rules): add optional `rules` to `SchemaSpec` in `Sources/AISDDModels/Spec.swift` (additive, Codable); an explicit-`command` rule compiles verbatim to a deterministic `CheckSpec`, `required` iff its severity is blocking, tagged `autoGenerated`."
    - "Tier-3 (judge) + intent-only rules: add optional `judge` to `SchemaSpec` in `Sources/AISDDModels/Spec.swift`; emit judges (and intent-only rules with no explicit command) as explicit `authored` advisory markers -- never a fabricated command or verdict."
    - "Centralize new path literals (schema source path, versioned artifact path, `<name>.structure` check name + check source path) in `Sources/AISDDEngine/Layout.swift`."
    - "Render committed-shape `kind: Check` YAML at an engine edge (a small render helper file under `Sources/AISDDEngine/`); keep the `SchemaCompiler` core encoder-free."
    - "Add a read-only `ai-sdd compile <schema>` `ParsableCommand` to `Sources/AISDDCLI/main.swift` (registered in `subcommands:`), mirroring `check`/`scope`/`cover`: prints each compiled check as committed-shape YAML tagged by origin; `--json` for machine output; `--help` documents it."
    - "Update `.ai-sdd/skills/ai-sdd-compile-schema/SKILL.md` to drive `ai-sdd compile` for the deterministic tiers (auto-generated checks committed as-is; authored markers finished + eval-gated by hand)."
    - "Add a test file under `Tests/AISDDEngineTests/`: the anchor (compile every real schema, assert the structural check == the committed `checks/<name>.structure.check.yaml`) plus per-tier units (structural template, explicit-command rule blocking/advisory, intent->authored, judge->authored, tier ordering, YAML round-trip)."
  out:
    - "Dedupe `Drift` Kind-1 onto `SchemaCompiler` (removing `Drift.expectedStructuralCheck` / `Drift.structuralCheckName`) -- that is the downstream `dedupe-drift` slice (C4); leave `Sources/AISDDEngine/Drift.swift` untouched here."
    - "Auto-wiring compiled check ids onto producer workers from the CLI -- stays a skill/human step."
    - "Cross-artifact resolution of intent->trusted-executor commands (scope/cover) -- left authored."
    - "Writing/committing compiled checks from the CLI -- `compile` prints only; the human/skill commits."
    - "Any change to `SchemaValidator`/`SpecLoader` decode behavior -- the compiler emits checks, it does not re-implement Tier-1 validation."

acceptance:
  - id: A1-structural-reproduces-committed
    description: >-
      `SchemaCompiler.compile(...)` over each committed `.ai-sdd/schemas/*.schema.yaml` reproduces the
      committed structural check -- same name (`<name>.structure`), `checkKind: deterministic`, command
      `swift run ai-sdd check .ai-sdd/schemas/<name>.schema.yaml .ai-sdd/artifacts/<name>.v<version>.<format>`,
      and `required: true` -- verified by a test that reads the real repo's committed
      `checks/<name>.structure.check.yaml`.
  - id: A2-structural-origin-autogenerated
    description: >-
      The Tier-1 structural check is tagged `Origin.autoGenerated`; the structural template is keyed
      only off the schema name + version + format, with no IO inside the compiler core.
  - id: A3-explicit-command-rule
    description: >-
      An explicit-`command` Tier-2 rule compiles to a deterministic `CheckSpec` whose `command`
      equals the rule's command verbatim, tagged `Origin.autoGenerated`, with `required: true` iff the
      rule's severity is blocking and `required: false` otherwise.
  - id: A4-intent-and-judge-authored
    description: >-
      An intent-only rule (no explicit command) and a Tier-3 `judge` compile to advisory `authored`
      markers -- no fabricated command and no fabricated verdict; the judge marker carries
      `checkKind: judge` and `required: false`.
  - id: A5-compile-cli
    description: >-
      `ai-sdd compile <schema>` prints each compiled check as committed-shape `kind: Check` YAML
      tagged by origin; `--json` emits the machine form; `ai-sdd compile --help` documents the
      command; it is read-only (writes nothing).
  - id: A6-skill-drives-engine
    description: >-
      `.ai-sdd/skills/ai-sdd-compile-schema/SKILL.md` references `ai-sdd compile` for the deterministic
      tiers (auto-generated checks committed as-is; authored markers finished + eval-gated by hand).
  - id: A7-paths-centralized
    description: >-
      The new path literals (schema source path, versioned artifact path, `<name>.structure` check
      name + check source path) are added to `Sources/AISDDEngine/Layout.swift`, not duplicated
      inline; YAML serialization lives at an engine edge, keeping the `SchemaCompiler` core
      encoder-free.
  - id: A8-green
    description: >-
      `swift build`, `swift test`, and `swift run ai-sdd validate .ai-sdd` all pass; existing
      `DriftTests`/`EngineTests` remain green (no change to `Drift.swift`).

decisions:
  - id: C1
    question: How far to model Tier-2/Tier-3?
    decision: >-
      Add optional `rules`/`judge` to `SchemaSpec` (`AISDDModels`); compile an explicit-`command`
      Tier-2 rule mechanically to a verbatim deterministic check (blocking iff severity is blocking,
      `Origin.autoGenerated`); emit intent-only rules and Tier-3 judges as explicit `authored`
      advisory markers -- never faked.
    status: closed
  - id: C2
    question: CLI surface for the compiler.
    decision: >-
      Add a read-only `ai-sdd compile <schema>` subcommand that prints committed-shape `kind: Check`
      YAML (`--json` for machine output, `--help` documented), mirroring `check`/`scope`/`cover`, AND
      update the `ai-sdd-compile-schema` skill to call it for the deterministic tiers.
    status: closed
  - id: C3
    question: Structural command form.
    decision: >-
      The Tier-1 structural `command` matches the COMMITTED reality
      `swift run ai-sdd check .ai-sdd/schemas/<name>.schema.yaml .ai-sdd/artifacts/<name>.v<version>.<format>`,
      not the skill prose's abbreviated `ai-sdd check ...`.
    status: closed
  - id: C4
    question: Touch `Drift.swift` (dedupe its Tier-1 copy)?
    decision: >-
      NOT in this slice. The Drift Kind-1 dedupe onto `SchemaCompiler` is the downstream
      `dedupe-drift` slice (user amendment 2026-06-22). Leave `Drift.swift` untouched here; keep
      `DriftTests` green.
    status: closed
  - id: C5
    question: Correctness anchor.
    decision: >-
      A test compiles every real `.ai-sdd/schemas/*.schema.yaml` and asserts the resulting structural
      check equals the committed `checks/<name>.structure.check.yaml` (name, checkKind, command,
      required), reading the real repo.
    status: closed

files:
  - Sources/AISDDEngine/
  - Sources/AISDDModels/Spec.swift
  - Sources/AISDDCLI/main.swift
  - Tests/AISDDEngineTests/
  - .ai-sdd/skills/ai-sdd-compile-schema/SKILL.md

tests:
  - swift build
  - swift test
  - swift run ai-sdd validate .ai-sdd
  - swift run ai-sdd compile .ai-sdd/schemas/feature-plan.schema.yaml
