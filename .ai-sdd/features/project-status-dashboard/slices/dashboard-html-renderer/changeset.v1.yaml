summary: >-
  Added a pure GraphRenderer dashboard HTML renderer that accepts prepared
  DashboardProjection sections, aggregates summary totals, renders a self-contained
  HTML document with embedded CSS, semantic status legend, bounded progress,
  section graph views, slice tables, and inline DashboardCharts SVG output. Added
  focused Swift Testing coverage for escaping, status classes, progress behavior,
  section/table rendering, and chart inclusion.
