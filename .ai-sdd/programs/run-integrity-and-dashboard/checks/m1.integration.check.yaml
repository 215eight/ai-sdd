apiVersion: ai-sdd/v1
kind: Check
metadata: { name: m1.integration }
spec:
  # The m1-time-axis-ready gate (automated, D3). The integration check: run-integrity's reconciliation
  # + timestamped events + owner-from-git must all land and verify together — full build + test +
  # spec-validation green on the tree. The specific smokes (a freshly written event carries a
  # `Z`-suffixed UTC `at`; a legacy absolute `pipelineDir` is reconciled not dropped; a slice owner is
  # populated from git identity) are asserted by run-integrity's own tests, so `swift test` here
  # transitively covers them. Trusted-by-construction (engine-tested commands), so blocking.
  checkKind: deterministic
  command: "swift build && swift test && swift run ai-sdd validate .ai-sdd"
  required: true
