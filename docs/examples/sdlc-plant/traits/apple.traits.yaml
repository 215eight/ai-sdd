# Composable convention/capability modules for Apple-platform development.
# Each Trait contributes conventions (injected), checks (enforced), and optionally
# resources. `requires` pulls in dependencies transitively, so a Stack lists only the
# leaves it cares about.
apiVersion: ai-sdd/v1
kind: Trait
metadata: { name: apple }
spec:
  conventions: ["conventions/apple.md"]
  checks: [lint.swift]
---
apiVersion: ai-sdd/v1
kind: Trait
metadata: { name: ios }
spec:
  requires: [apple]
  conventions: ["conventions/ios.md"]
  checks: [build.ios]
---
apiVersion: ai-sdd/v1
kind: Trait
metadata: { name: macos }
spec:
  requires: [apple]
  conventions: ["conventions/macos.md"]
  checks: [build.macos]
---
apiVersion: ai-sdd/v1
kind: Trait
metadata: { name: combine }
spec:
  requires: [apple]
  conventions: ["conventions/combine.md"]
---
apiVersion: ai-sdd/v1
kind: Trait
metadata: { name: swiftui }
spec:
  requires: [apple]
  conventions: ["conventions/swiftui.md"]
---
apiVersion: ai-sdd/v1
kind: Trait
metadata: { name: acme-ui }          # conventions for a specific UI package
spec:
  requires: [swiftui]
  conventions: ["conventions/acme-ui.md"]
  resources: [acme-ui-docs]          # e.g. the package's docs MCP
  checks: [judge.acme-ui-conformance]
