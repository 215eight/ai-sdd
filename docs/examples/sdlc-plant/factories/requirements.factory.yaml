apiVersion: factory/v1
kind: Factory
metadata:
  name: requirements
  version: 1
  owner: product             # PM owns this phase (Conway's law)
spec:
  consumes: [intake-bundle.v1]   # a UNION of varied sources (gdoc + repo file + pdf + ...), synthesized into one spec
  produces: locked-spec.v1       # the master-requirements contract handed to Design & Code

  # The contract version this Factory emits (ADR-0017). Bumping it additively -> minor; the
  # contract-compat Check gates the change; downstream consumers on `^1.x` keep working.
  contracts:
    provides: [{ name: locked-spec, version: "1.0" }]

  rootPipeline: requirements-main
  pipelines:
    - { ref: requirements-main }
  workers:
    - intake.normalizer        # vague idea -> structured requirements (maps to IntakeNormalizer)
    - decision-closer          # drives out ambiguity -> closed decisions
    - requirements-author      # master requirements (the locked spec)

  # "Spec locked" gate: cannot exit while any decision is open or the spec is incomplete.
  exitContract:
    artifact: locked-spec.v1
    requiredChecks: [no-open-decisions, spec-complete]
