apiVersion: ai-sdd/v1
kind: Check
metadata: { name: validation-result.structure }
spec:
  # Same gate as the factory's validation-result.structure: reads the produced milestone artifact and
  # enforces `outcome == pass`. Resolved (not executed) at validate time; runs only at milestone time.
  checkKind: deterministic
  command: "swift run ai-sdd check .ai-sdd/schemas/validation-result.schema.yaml .ai-sdd/artifacts/validation-result.v1.yaml"
  required: true
