apiVersion: ai-sdd/v1
kind: Worker
metadata: { name: milestone-gate }
spec:
  # Manual milestone (mirrors .ai-sdd/workers/milestone-gate.worker.yaml). A human validates the
  # integrated work and records validation-result.v1; the structural check enforces `outcome == pass`.
  workerKind: human
  produces: [{ schema: validation-result.v1 }]
  task: { skill: validate-milestone }
  checks: [validation-result.structure]
