apiVersion: ai-sdd/v1
kind: Schema
metadata: { name: changeset, version: 1 }
spec:
  handle: files
  format: yaml          # structured ⇒ the fields below compile to deterministic checks
  scope: internal
  fields:
    summary:
      type: string
      required: true
      invariants: [ { nonEmpty: true } ]
    satisfies:                                   # the acceptance item ids this change addresses
      type: list
      required: true
      invariants:
        - { nonEmpty: true }
        - { all: { nonEmpty: true } }            # each id is a non-empty string
